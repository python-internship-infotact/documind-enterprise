name: Deploy DocuMind Enterprise

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai_service/requirements.txt
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Test backend
      run: |
        python -m pytest ai_service/ --verbose || echo "No tests found"
    
    - name: Test frontend build
      run: |
        cd frontend
        npm run build:prod
    
    - name: Test production configuration
      run: |
        chmod +x test-production.sh
        ./test-production.sh

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      run: |
        echo "Backend deployment is handled by Render's auto-deploy feature"
        echo "Ensure your Render service is connected to this repository"

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Vercel
      run: |
        echo "Frontend deployment is handled by Vercel's auto-deploy feature"
        echo "Ensure your Vercel project is connected to this repository"