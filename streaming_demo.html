<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind Enterprise - Streaming Chat Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }
        
        .chat-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            background-color: #fafafa;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }
        
        .user-message {
            background-color: #e3f2fd;
            margin-left: 20%;
            text-align: right;
        }
        
        .ai-message {
            background-color: #f1f8e9;
            margin-right: 20%;
        }
        
        .streaming-message {
            background-color: #fff3e0;
            margin-right: 20%;
            border-left: 4px solid #ff9800;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
        }
        
        .input-field {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .send-button {
            padding: 12px 24px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .send-button:hover {
            background-color: #45a049;
        }
        
        .send-button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .metrics {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .metric-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .metric-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .sources {
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .source-item {
            margin: 5px 0;
            padding: 5px;
            background-color: white;
            border-radius: 3px;
        }
        
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .typewriter {
            border-right: 2px solid #333;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { border-color: transparent; }
            51%, 100% { border-color: #333; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 DocuMind Enterprise</h1>
        <h2>Week 3: Streaming Chat Demo</h2>
        <p>Real-time AI responses with sub-second Time to First Token (TTFT)</p>
    </div>
    
    <div class="chat-container">
        <h3>💬 Chat Interface</h3>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="input-container">
            <input 
                type="text" 
                class="input-field" 
                id="messageInput" 
                placeholder="Ask about company policies, refunds, support..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-button" id="sendButton" onclick="sendMessage()">
                Send
            </button>
        </div>
    </div>
    
    <div class="metrics">
        <div class="metric-card">
            <div class="metric-value" id="ttftValue">-</div>
            <div class="metric-label">Time to First Token (ms)</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="totalTimeValue">-</div>
            <div class="metric-label">Total Response Time (s)</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="tokensPerSecValue">-</div>
            <div class="metric-label">Tokens per Second</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="sourcesCountValue">-</div>
            <div class="metric-label">Sources Retrieved</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let sessionId = `demo_session_${Date.now()}`;
        let currentStreamingMessage = null;
        
        // Sample questions for quick testing
        const sampleQuestions = [
            "What is the refund policy?",
            "How do I contact customer support?",
            "What are the terms of service?",
            "How do I cancel my subscription?",
            "What payment methods are accepted?"
        ];
        
        function addMessage(content, isUser = false, isStreaming = false) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            
            if (isUser) {
                messageDiv.className = 'message user-message';
                messageDiv.innerHTML = `<strong>You:</strong> ${content}`;
            } else if (isStreaming) {
                messageDiv.className = 'message streaming-message';
                messageDiv.innerHTML = `<strong>AI:</strong> <span class="typewriter" id="streamingContent"></span>`;
                currentStreamingMessage = messageDiv;
            } else {
                messageDiv.className = 'message ai-message';
                messageDiv.innerHTML = `<strong>AI:</strong> ${content}`;
            }
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return messageDiv;
        }
        
        function updateStreamingContent(content) {
            if (currentStreamingMessage) {
                const streamingSpan = currentStreamingMessage.querySelector('#streamingContent');
                if (streamingSpan) {
                    streamingSpan.textContent = content;
                }
            }
        }
        
        function finalizeStreamingMessage(content, sources = []) {
            if (currentStreamingMessage) {
                currentStreamingMessage.className = 'message ai-message';
                
                let sourcesHtml = '';
                if (sources && sources.length > 0) {
                    sourcesHtml = '<div class="sources"><strong>Sources:</strong>';
                    sources.forEach(source => {
                        sourcesHtml += `<div class="source-item">📄 ${source.source_file} (Page ${source.page_number}) - Score: ${source.score.toFixed(3)}</div>`;
                    });
                    sourcesHtml += '</div>';
                }
                
                currentStreamingMessage.innerHTML = `<strong>AI:</strong> ${content}${sourcesHtml}`;
                currentStreamingMessage = null;
            }
        }
        
        function updateMetrics(metrics) {
            if (metrics.time_to_first_token !== undefined) {
                document.getElementById('ttftValue').textContent = 
                    (metrics.time_to_first_token * 1000).toFixed(0);
            }
            if (metrics.total_processing_time !== undefined) {
                document.getElementById('totalTimeValue').textContent = 
                    metrics.total_processing_time.toFixed(2);
            }
            if (metrics.tokens_per_second !== undefined) {
                document.getElementById('tokensPerSecValue').textContent = 
                    metrics.tokens_per_second.toFixed(1);
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            addMessage(message, true);
            
            // Clear input and disable button
            input.value = '';
            sendButton.disabled = true;
            sendButton.textContent = 'Streaming...';
            
            // Start streaming message
            addMessage('', false, true);
            
            let fullResponse = '';
            let sources = [];
            let startTime = Date.now();
            let firstTokenTime = null;
            
            try {
                const response = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: message,
                        session_id: sessionId,
                        include_sources: true
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'sources') {
                                    sources = data.sources || [];
                                    document.getElementById('sourcesCountValue').textContent = sources.length;
                                    
                                } else if (data.type === 'token') {
                                    if (firstTokenTime === null) {
                                        firstTokenTime = Date.now();
                                        const ttft = (firstTokenTime - startTime) / 1000;
                                        updateMetrics({ time_to_first_token: ttft });
                                    }
                                    
                                    fullResponse += data.content;
                                    updateStreamingContent(fullResponse);
                                    
                                } else if (data.type === 'metadata') {
                                    if (data.metadata && data.metadata.latency_metrics) {
                                        updateMetrics(data.metadata.latency_metrics);
                                    }
                                    
                                } else if (data.type === 'error') {
                                    throw new Error(data.error);
                                    
                                } else if (data.type === 'done') {
                                    finalizeStreamingMessage(fullResponse, sources);
                                    break;
                                }
                                
                            } catch (parseError) {
                                console.warn('Failed to parse chunk:', parseError);
                            }
                        }
                    }
                }
                
            } catch (error) {
                console.error('Streaming error:', error);
                if (currentStreamingMessage) {
                    currentStreamingMessage.className = 'message ai-message';
                    currentStreamingMessage.innerHTML = `<strong>AI:</strong> <span style="color: red;">Error: ${error.message}</span>`;
                    currentStreamingMessage = null;
                }
            } finally {
                // Re-enable button
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Add sample questions as clickable options
        function addSampleQuestions() {
            const messagesContainer = document.getElementById('chatMessages');
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message ai-message';
            welcomeDiv.innerHTML = `
                <strong>AI:</strong> Welcome to DocuMind Enterprise! Try asking about:
                <div style="margin-top: 10px;">
                    ${sampleQuestions.map(q => 
                        `<button onclick="document.getElementById('messageInput').value='${q}'; sendMessage();" 
                                style="display: block; margin: 5px 0; padding: 8px; background: #e3f2fd; border: 1px solid #2196f3; border-radius: 4px; cursor: pointer; width: 100%;">
                            ${q}
                        </button>`
                    ).join('')}
                </div>
            `;
            messagesContainer.appendChild(welcomeDiv);
        }
        
        // Initialize demo
        document.addEventListener('DOMContentLoaded', function() {
            addSampleQuestions();
            
            // Test API connection
            fetch(`${API_BASE}/health`)
                .then(response => response.json())
                .then(data => {
                    const status = document.createElement('div');
                    status.className = 'status success';
                    status.textContent = `✅ Connected to DocuMind API - Status: ${data.status}`;
                    document.body.insertBefore(status, document.querySelector('.chat-container'));
                })
                .catch(error => {
                    const status = document.createElement('div');
                    status.className = 'status error';
                    status.textContent = `❌ Failed to connect to API at ${API_BASE}. Make sure the server is running.`;
                    document.body.insertBefore(status, document.querySelector('.chat-container'));
                });
        });
    </script>
</body>
</html>
