services:
  - type: web
    name: documind-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.backend
    healthCheckPath: /health
    plan: free # Adjust as needed
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2